<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Muayene ve Kabul Tutanağı</title>
    <link rel="icon" type="image/png" href="logo.png" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="screen-toolbar screen-only">
      <button id="printButton" type="button">Yazdır</button>
      <div id="printMetaInfo" class="print-meta-info">Yazdırılacak tutanak sayısı: 0</div>
      <a id="settingsLink" href="#" role="button">Ayarları Aç</a>
    </div>

    <main class="page">
      <div id="documentsContainer"></div>
    </main>

    <template id="documentTemplate">
      <section class="document">
        <h1>MUAYENE VE KABUL TUTANAĞI</h1>

        <table class="info-table">
          <tbody>
            <tr>
              <th>İdarenin Adı :</th>
              <td data-field="idareAdi">-</td>
            </tr>
            <tr>
              <th>Yapılan İş / Mal / Hizmetin Adı, Niteliği :</th>
              <td data-field="yapilanIs">-</td>
            </tr>
            <tr>
              <th>Onay Belgesi Tarih ve No.su :</th>
              <td data-field="onayBelgesi">-</td>
            </tr>
            <tr>
              <th>Satanın Adı Ünvanı :</th>
              <td data-field="satanFirma">-</td>
            </tr>
            <tr>
              <th>Muayene Edilen Yer :</th>
              <td data-field="muayeneYeri">-</td>
            </tr>
          </tbody>
        </table>

        <table class="items-table">
          <thead>
            <tr>
              <th>S. No</th>
              <th>Teslim Alınan Malın Cinsi ve Özellikleri</th>
              <th>Miktarı</th>
              <th>Birimi</th>
              <th>Teslim Tarihi</th>
              <th>Kabul Edilen Miktar</th>
              <th>Red Edilen Miktar</th>
            </tr>
          </thead>
          <tbody data-field="itemsBody"></tbody>
        </table>

        <div class="commission-section">
          <h2>MUAYENE VE KABUL KOMİSYONU</h2>

          <p class="narrative" data-field="narrativeText">-</p>

          <div class="section-title">Muayene ve Kabul Görevlileri</div>
          <div class="signatures" data-field="signatures"></div>

          <div class="manager-block">
            <div data-field="formDate">-</div>
            <div data-field="okulMuduru">-</div>
            <div class="signature-role">Okul Müdürü</div>
          </div>
        </div>

        <div data-field="pageMarkers" class="page-markers"></div>
      </section>
    </template>

    <script src="print.js"></script>
  </body>
</html>
